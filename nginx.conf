server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Контракт платформы awwwdde: 200 на /healthz, когда сервис готов.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Хешированные ассеты Vite — кешируем агрессивно.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: любой неизвестный путь отдаёт index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
